<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Duolingo de Grego Antigo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2b2b45);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .app {
      width: 360px;
    }

    .progress-bar {
      height: 10px;
      background: #444;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #06d6a0;
      transition: width 0.3s;
    }

    .card {
      background: #2f2f4f;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 15px;
    }

    #pergunta {
      font-size: 18px;
      margin-bottom: 20px;
      color: #ffd166;
    }

    .choices button {
      display: block;
      width: 100%;
      margin: 5px 0;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #3f3f6a;
      color: white;
    }

    .choices button:hover {
      background: #57578a;
    }

    #feedback {
      margin-top: 15px;
      min-height: 40px;
      font-weight: bold;
    }

    .correto { color: #06d6a0; }
    .meio { color: #ffd166; }
    .errado { color: #ef476f; }

    .hud {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .fade {
      animation: fade 0.4s;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(10px);} 
      to { opacity: 1; transform: translateY(0);} 
    }
  </style>
</head>
<body>

<div class="app">
  <div class="hud">
    <div id="streak">🔥 0</div>
    <div id="score">0 pts</div>
  </div>

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>

  <div class="card fade">
    <h1>🇬🇷 Grego Antigo</h1>
    <div id="pergunta"></div>
    <div class="choices" id="choices"></div>
    <div id="feedback"></div>
  </div>
</div>

<script>
const palavras = [
  {
    base: "λόγος",
    formas: {
      nominativo: "ὁ λόγος",
      genitivo: "τοῦ λόγου",
      dativo: "τῷ λόγῳ",
      acusativo: "τὸν λόγον"
    }
  },
  {
    base: "ἄνθρωπος",
    formas: {
      nominativo: "ὁ ἄνθρωπος",
      genitivo: "τοῦ ἀνθρώπου",
      dativo: "τῷ ἀνθρώπῳ",
      acusativo: "τὸν ἄνθρωπον"
    }
  },
  {
    base: "δῶρον",
    formas: {
      nominativo: "τὸ δῶρον",
      genitivo: "τοῦ δώρου",
      dativo: "τῷ δώρῳ",
      acusativo: "τὸ δῶρον"
    }
  }
];

const casos = ["nominativo", "genitivo", "dativo", "acusativo"];

let atual = {};
let pontos = 0;
let streak = 0;
let progresso = 0;

function normalizar(str) {
  return str
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function novaPergunta() {
  document.getElementById("feedback").innerText = "";

  const palavra = palavras[Math.floor(Math.random()*palavras.length)];
  const caso = casos[Math.floor(Math.random()*casos.length)];

  const correta = palavra.formas[caso];

  let opcoes = [correta];

  while (opcoes.length < 4) {
    const p = palavras[Math.floor(Math.random()*palavras.length)];
    const c = casos[Math.floor(Math.random()*casos.length)];
    const tentativa = p.formas[c];
    if (!opcoes.includes(tentativa)) opcoes.push(tentativa);
  }

  opcoes = shuffle(opcoes);

  atual = { correta };

  document.getElementById("pergunta").innerText = palavra.base + " — " + caso;

  const container = document.getElementById("choices");
  container.innerHTML = "";

  opcoes.forEach(op => {
    const btn = document.createElement("button");
    btn.innerText = op;
    btn.onclick = () => checar(op);
    container.appendChild(btn);
  });
}

function checar(resposta) {
  const correta = atual.correta;

  if (resposta === correta) {
    pontos += 10;
    streak++;
    document.getElementById("feedback").innerText = "✔ Perfeito!";
    document.getElementById("feedback").className = "correto";
  } else if (normalizar(resposta) === normalizar(correta)) {
    pontos += 5;
    streak++;
    document.getElementById("feedback").innerText = "⚠ Quase! " + correta;
    document.getElementById("feedback").className = "meio";
  } else {
    streak = 0;
    document.getElementById("feedback").innerText = "✘ " + correta;
    document.getElementById("feedback").className = "errado";
  }

  progresso += 10;
  if (progresso > 100) progresso = 100;

  document.getElementById("score").innerText = pontos + " pts";
  document.getElementById("streak").innerText = "🔥 " + streak;
  document.getElementById("progress").style.width = progresso + "%";

  setTimeout(() => {
    if (progresso === 100) {
      alert("🏆 Você completou a lição!");
      progresso = 0;
    }
    novaPergunta();
  }, 900);
}

novaPergunta();
</script>

</body>
</html>
