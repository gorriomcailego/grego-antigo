<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Duolingo de Grego Antigo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2b2b45);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .app { width: 360px; }
    .progress-bar { height: 10px; background: #444; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
    .progress { height: 100%; width: 0%; background: #06d6a0; transition: width 0.3s; }
    .card { background: #2f2f4f; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
    #pergunta { font-size: 20px; margin-bottom: 20px; color: #ffd166; }
    .choices button { display: block; width: 100%; margin: 6px 0; padding: 12px; border-radius: 10px; border: none; cursor: pointer; background: #3f3f6a; color: white; font-size: 16px; }
    .choices button:hover { background: #57578a; }
    #feedback { margin-top: 15px; min-height: 40px; font-weight: bold; }
    .correto { color: #06d6a0; }
    .errado { color: #ef476f; }
    .hud { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="app">
  <div class="hud">
    <div id="streak">🔥 0</div>
    <div id="score">0 pts</div>
  </div>

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>

  <div class="card">
    <div id="pergunta"></div>
    <div class="choices" id="choices"></div>
    <div id="feedback"></div>
  </div>
</div>

<script>
// Base inspirada no dicionário: 3 declinações + gêneros
const palavras = [
  { base: "λόγος", genero: "m", decl: 2 },
  { base: "δῶρον", genero: "n", decl: 2 },
  { base: "θάλαττα", genero: "f", decl: 1 },
  { base: "ἀνήρ", genero: "m", decl: 3 }
];

// artigos completos
const artigos = {
  m: {
    sg: { nom: "ὁ", gen: "τοῦ", dat: "τῷ", acc: "τὸν" },
    pl: { nom: "οἱ", gen: "τῶν", dat: "τοῖς", acc: "τούς" }
  },
  f: {
    sg: { nom: "ἡ", gen: "τῆς", dat: "τῇ", acc: "τήν" },
    pl: { nom: "αἱ", gen: "τῶν", dat: "ταῖς", acc: "τάς" }
  },
  n: {
    sg: { nom: "τό", gen: "τοῦ", dat: "τῷ", acc: "τό" },
    pl: { nom: "τά", gen: "τῶν", dat: "τοῖς", acc: "τά" }
  }
};

const casos = ["nom", "gen", "dat", "acc"];
const numeros = ["sg", "pl"];

let atual = {};
let pontos = 0;
let streak = 0;
let progresso = 0;

function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

function novaPergunta() {
  document.getElementById("feedback").innerText = "";

  const palavra = palavras[Math.floor(Math.random()*palavras.length)];
  const caso = casos[Math.floor(Math.random()*casos.length)];
  const numero = numeros[Math.floor(Math.random()*numeros.length)];

  const correta = artigos[palavra.genero][numero][caso];

  let opcoes = [correta];

  // gerar distrações
  while (opcoes.length < 4) {
    const g = ["m","f","n"][Math.floor(Math.random()*3)];
    const n = numeros[Math.floor(Math.random()*2)];
    const c = casos[Math.floor(Math.random()*4)];
    const tentativa = artigos[g][n][c];
    if (!opcoes.includes(tentativa)) opcoes.push(tentativa);
  }

  opcoes = shuffle(opcoes);

  atual = { correta };

  document.getElementById("pergunta").innerText =
    palavra.base + " — " + caso + " " + numero;

  const container = document.getElementById("choices");
  container.innerHTML = "";

  opcoes.forEach(op => {
    const btn = document.createElement("button");
    btn.innerText = op;
    btn.onclick = () => checar(op);
    container.appendChild(btn);
  });
}

function checar(resposta) {
  if (resposta === atual.correta) {
    pontos += 10;
    streak++;
    document.getElementById("feedback").innerText = "✔";
    document.getElementById("feedback").className = "correto";
  } else {
    streak = 0;
    document.getElementById("feedback").innerText = "✘ " + atual.correta;
    document.getElementById("feedback").className = "errado";
  }

  progresso += 10;
  if (progresso > 100) progresso = 100;

  document.getElementById("score").innerText = pontos + " pts";
  document.getElementById("streak").innerText = "🔥 " + streak;
  document.getElementById("progress").style.width = progresso + "%";

  setTimeout(() => {
    if (progresso === 100) {
      alert("🏆 Lição completa!");
      progresso = 0;
    }
    novaPergunta();
  }, 800);
}

novaPergunta();
</script>

</body>
</html>
